# The static set of categories and items players can hunt for.
#
# Every item's `label` must be a class name one of the frontend's two
# on-device detectors can actually recognize — COCO-SSD's fixed 80 classes
# or MobileNet's ~1000-class ImageNet vocabulary (see
# frontend/src/lib/detector.ts's pickDetector, and this package's own test
# which validates every label here against both real vocabularies). Where a
# category's theme calls for something neither model has a word for (a bare
# "tree", a loose "stone"), the closest detectable stand-in is used instead
# (e.g. `potted plant` for "wildflower"), with `displayName` naming it
# honestly rather than pretending it's the literal thing.
#
# `id` values are permanent: they're referenced by game_items/captures rows
# in the database, so renaming or removing one would orphan history for any
# game already using it. Add new items/categories rather than reusing an id.
