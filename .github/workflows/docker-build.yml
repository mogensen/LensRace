name: Docker build

# Builds the production Dockerfile on every push to main and every PR, so a
# broken image (e.g. the frontend build stage's pinned pnpm version falling
# out of sync with frontend/pnpm-lock.yaml's lockfileVersion, which broke
# Render deploys in #8) fails CI instead of only surfacing after merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push — this only validates the build)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
