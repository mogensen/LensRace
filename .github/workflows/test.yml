name: Tests

# Runs the Go unit test suite (internal/...) on every pull request and every
# push to main, so a regression is caught in CI before merge rather than
# only being found by manually running `go test ./...` locally.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...
      - run: go test ./... -v
